{% extends "base.html" %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card saas-card">
        <div class="auth-card-header">
            <span class="section-eyebrow">Account</span>
            <h1 class="section-title">Create your account</h1>
            <p class="section-text">Start with a free plan and upgrade later if you need larger file uploads.</p>
        </div>
        <div class="auth-card-body">
            <form method="post" class="auth-form">
                <div class="mb-3">
                    <label class="form-label app-label" for="email">Email</label>
                    <input class="form-control app-input" id="email" name="email" type="email" value="{{ form_email or '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label app-label" for="password">Password</label>
                    <input class="form-control app-input" id="password" name="password" type="password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label app-label" for="confirm_password">Confirm Password</label>
                    <input class="form-control app-input" id="confirm_password" name="confirm_password" type="password" required>
                </div>
                <button class="btn btn-app btn-app-primary w-100" type="submit">Create account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
